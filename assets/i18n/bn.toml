[about]
title = "সফটওয়্যার পরিচিতি"
description = "WSL ড্যাশবোর্ড হল 'উইন্ডোজ সাবসিস্টেম ফর লিনাক্স (WSL)' এর জন্য একটি ওপেন-সোর্স ভিজ্যুয়াল ম্যানেজমেন্ট টুল। এটি ব্যবহারকারীদের লিনাক্স ডিস্ট্রিবিউশনগুলি দক্ষতার সাথে পরিচালনার জন্য একটি সহজ গ্রাফিকাল ইন্টারফেস প্রদান করে, যা এক-ক্লিক স্টার্ট, স্টপ, রিস্টার্ট, ক্লোনিং এবং ব্যাকআপ এক্সপোর্টের মতো মূল ফাংশনগুলিকে সমর্থন করে। এতে একটি অন্তর্নির্মিত ডিস্ট্রিবিউশন স্টোরও রয়েছে, যা WSL পরিচালনা এবং ব্যবহারকে আরও সহজ এবং সুবিধাজনক করে তোলে।"
version = "সংস্করণ"
check_update = "আপডেট চেক করা হচ্ছে..."
new_version = "একটি নতুন সংস্করণ উপলব্ধ: v{0}"
homepage = "প্রকল্পের হোমপেজ"
issues = "সমস্যা (বাগ জমা দিন, নতুন বৈশিষ্ট্যের অনুরোধ করুন)"
discussions = "আলোচনা (প্রশ্ন ও উত্তর, ধারণা ভাগ করা, কমিউনিটি ঘোষণা)"
star = "আপনি যদি এই প্রকল্পটি দরকারী মনে করেন, তবে আমি কৃতজ্ঞ থাকব যদি আপনি GitHub-এ একটি স্টার দিতে পারেন। আপনার সমর্থন এটিকে আরও বৃহত্তর শ্রোতাদের কাছে পৌঁছাতে সাহায্য করে এবং গভীরভাবে প্রশংসিত হয়। এই উৎসাহই আমাকে নির্মাণ চালিয়ে যেতে অনুপ্রাণিত করে।"
