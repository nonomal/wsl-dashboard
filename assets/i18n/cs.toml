[about]
title = "O aplikaci"
description = "WSL Dashboard je open-source vizuální nástroj pro správu Windows Subsystem for Linux (WSL). Poskytuje uživatelům intuitivní grafické rozhraní pro efektivní správu distribucí Linuxu, podporující základní funkce jako spuštění jedním kliknutím, zastavení, restart, klonování a export záloh. Obsahuje také vestavěný obchod s distribucemi, což zjednodušuje a zpříjemňuje správu a používání WSL."
version = "Verze"
check_update = "Kontrola aktualizací..."
new_version = "K dispozici je nová verze: v{0}"
homepage = "Domovská stránka"
issues = "Problémy (Nahlásit chyby, požádat o nové funkce)"
discussions = "Diskuze (Otázky a odpovědi, sdílení nápadů, oznámení komunity)"
star = "Pokud vám tento projekt připadá užitečný, byl bych vděčný, kdybyste mu mohli nechat hvězdičku na GitHubu. Vaše podpora mu pomáhá oslovit širší publikum a hluboce si jí vážím. Právě toto povzbuzení mě motivuje k dalšímu budování."
love = "Dílo z lásky"

