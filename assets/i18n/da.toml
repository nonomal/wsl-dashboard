[about]
title = "Om programmet"
description = "WSL Dashboard er et open-source visuelt administrationsværktøj til Windows Subsystem for Linux (WSL). Det giver brugerne en intuitiv grafisk grænseflade til effektiv styring af Linux-distributioner, og understøtter kernefunktioner såsom start med ét klik, stop, genstart, kloning og eksport af sikkerhedskopier. Det inkluderer også en indbygget distributionsbutik, hvilket gør WSL-administration og brug enklere og mere praktisk."
version = "Version"
updates = "(Se efter opdateringer)"
check_update = "Søger efter opdateringer..."
new_version = "En ny version er tilgængelig: v{0}"
homepage = "Hjemmeside"
group = "Deltag i den officielle kommunikationsgruppe"
issues = "Problemer (Indsend fejl, anmod om nye funktioner)"
discussions = "Diskussioner (Q&A, deling af ideer, fællesskabsmeddelelser)"
star = "Hvis du har fundet dette projekt nyttigt, ville jeg være taknemmelig, hvis du ville efterlade en stjerne på GitHub. Din støtte hjælper det med at nå ud til et bredere publikum og værdsættes dybt. Det er denne opmuntring, der motiverer mig til at fortsætte med at bygge."
love = "Arbejde udført med kærlighed"

