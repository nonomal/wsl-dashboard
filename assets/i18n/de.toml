[about]
title = "Software-Vorstellung"
description = "WSL Dashboard ist ein Open-Source-Visual-Management-Tool für das Windows-Subsystem für Linux (WSL). Es bietet Benutzern eine intuitive grafische Oberfläche zur effizienten Verwaltung von Linux-Distributionen und unterstützt Kernfunktionen wie Starten, Stoppen, Neustarten, Klonen und Exportieren von Backups mit nur einem Klick. Es enthält außerdem einen integrierten Distributions-Store, der die Verwaltung und Nutzung von WSL einfacher und bequemer macht."
version = "Version"
check_update = "Update-Prüfung..."
new_version = "Eine neue Version ist verfügbar: v{0}"
homepage = "Projekt-Homepage"
issues = "Probleme (Fehler melden, neue Funktionen anfordern)"
discussions = "Diskussionen (Q&A, Ideenaustausch, Community-Ankündigungen)"
star = "Wenn Sie dieses Projekt nützlich fanden, wäre ich Ihnen dankbar, wenn Sie einen Stern auf GitHub hinterlassen könnten. Ihre Unterstützung hilft dabei, ein breiteres Publikum zu erreichen, und wird sehr geschätzt. Es ist diese Ermutigung, die mich motiviert, weiter zu bauen."
love = "Herzensprojekt"

