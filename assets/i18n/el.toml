[about]
title = "Σχετικά με την εφαρμογή"
description = "Το WSL Dashboard είναι ένα εργαλείο οπτικής διαχείρισης ανοιχτού κώδικα για το Windows Subsystem for Linux (WSL). Παρέχει στους χρήστες μια διαισθητική γραφική διεπαφή για την αποτελεσματική διαχείριση των διανομών Linux, υποστηρίζοντας βασικές λειτουργίες όπως εκκίνηση με ένα κλικ, διακοπή, επανεκκίνηση, κλωνοποίηση και εξαγωγή αντιγράφων ασφαλείας. Περιλαμβάνει επίσης ένα ενσωματωμένο κατάστημα διανομών, κάνοντας τη διαχείριση και τη χρήση του WSL απλούστερη και πιο βολική."
version = "Έκδοση"
check_update = "Έλεγχος ενημερώσεων..."
new_version = "Μια νέα έκδοση είναι διαθέσιμη: v{0}"
homepage = "Ιστοσελίδα"
issues = "Ζητήματα (Υποβολή σφαλμάτων, αιτήματα νέων λειτουργιών)"
discussions = "Συζητήσεις (Ερωτήσεις και απαντήσεις, ανταλλαγή ιδεών, ανακοινώσεις κοινότητας)"
star = "Εάν βρήκατε αυτό το έργο χρήσιμο, θα σας ήμουν ευγνώμων εάν μπορούσατε να αφήσετε ένα αστέρι στο GitHub. Η υποστήριξή σας το βοηθά να προσεγγίσει ένα ευρύτερο κοινό και εκτιμάται βαθύτατα. Αυτή η ενθάρρυνση είναι που με ωθεί να συνεχίσω να δημιουργώ."
love = "Έργο αγάπης"

