[about]
title = "Ohjelmiston esittely"
description = "WSL Dashboard on avoimen lähdekoodin visuaalinen hallintatyökalu Windows Subsystem for Linuxille (WSL). Se tarjoaa käyttäjille intuitiivisen graafisen käyttöliittymän Linux-jakeluiden tehokkaaseen hallintaan, tukien ydintoimintoja kuten yhden napsautuksen käynnistystä, pysäytystä, uudelleenkäynnistystä, kloonausta ja varmuuskopioiden vientiä. Se sisältää myös sisäänrakennetun jakelukaupan, mikä tekee WSL:n hallinnasta ja käytöstä yksinkertaisempaa ja kätevämpää."
version = "Versio"
updates = "(Tarkista päivitykset)"
check_update = "Tarkistetaan päivityksiä..."
new_version = "Uusi versio on saatavilla: v{0}"
homepage = "Kotisivu"
group = "Liity viralliseen viestintäryhmään"
issues = "Ongelmat (Lähetä virheitä, pyydä uusia ominaisuuksia)"
discussions = "Keskustelut (Kysymykset ja vastaukset, ideoiden jakaminen, yhteisön ilmoitukset)"
star = "Jos olet kokenut tämän projektin hyödylliseksi, olisin kiitollinen, jos voisit jättää tähden GitHubissa. Tukesi auttaa sitä saavuttamaan laajemman yleisön ja on syvästi arvostettu. Juuri tämä rohkaisu motivoi minua jatkamaan rakentamista."
love = "Sydämen asia"

