[about]
title = "सॉफ्टवेयर परिचय"
description = "WSL डैशबोर्ड 'विंडोज सबसिस्टम फॉर लिनक्स (WSL)' के लिए एक ओपन-सोर्स विजुअल मैनेजमेंट टूल है। यह लिनक्स डिस्ट्रिब्यूशन को कुशलतापूर्वक प्रबंधित करने के लिए उपयोगकर्ताओं को एक सहज ग्राफिकल इंटरफ़ेस प्रदान करता है, जो एक-क्लिक स्टार्ट, स्टॉप, रिस्टार्ट, क्लोनिंग और बैकअप निर्यात जैसे मुख्य कार्यों का समर्थन करता है। इसमें एक अंतर्निहित डिस्ट्रिब्यूशन स्टोर भी शामिल है, जो WSL प्रबंधन और उपयोग को सरल और अधिक सुविधाजनक बनाता है।"
version = "संस्करण"
check_update = "अपडेट की जांच हो रही है..."
new_version = "एक नया संस्करण उपलब्ध है: v{0}"
homepage = "प्रोजेक्ट होमपेज"
issues = "समस्याएं (बग सबमिट करें, नई सुविधाओं का अनुरोध करें)"
discussions = "चर्चाएँ (प्रश्न और उत्तर, विचार साझा करना, सामुदायिक घोषणाएं)"
star = "यदि आपको यह प्रोजेक्ट उपयोगी लगा, तो मैं आभारी रहूँगा यदि आप GitHub पर एक स्टार छोड़ सकें। आपका समर्थन इसे व्यापक दर्शकों तक पहुँचाने में मदद करता है और इसकी गहराई से सराहना की जाती है। यही प्रोत्साहन मुझे निर्माण जारी रखने के लिए प्रेरित करता है।"
