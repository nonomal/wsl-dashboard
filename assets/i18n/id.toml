homepage = "Beranda proyek"
issues = "Masalah (Kirim bug, minta fitur baru)"
discussions = "Diskusi (Tanya Jawab, berbagi ide, pengumuman komunitas)"
star = "Jika Anda merasa proyek ini bermanfaat, saya akan sangat berterima kasih jika Anda dapat memberikan bintang di GitHub. Dukungan Anda membantu proyek ini menjangkau khalayak yang lebih luas dan sangat dihargai. Dorongan inilah yang memotivasi saya untuk terus berkarya."
love = "Karya penuh cinta"

