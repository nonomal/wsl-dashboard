[about]
title = "O aplikácii"
description = "WSL Dashboard je open-source vizuálny nástroj na správu Windows Subsystem for Linux (WSL). Poskytuje používateľom intuitívne grafické rozhranie na efektívnu správu linuxových distribúcií, podporuje základné funkcie ako spustenie jedným kliknutím, zastavenie, reštart, klonovanie a export záloh. Obsahuje tiež vstavaný obchod s distribúciami, vďaka čomu je správa a používanie WSL jednoduchšie a pohodlnejšie."
version = "Verzia"
check_update = "Kontrola aktualizácií..."
new_version = "K dispozícii je nová verzia: v{0}"
homepage = "Domovská stránka"
issues = "Problémy (Nahlásiť chyby, požiadať o nové funkcie)"
discussions = "Diskusie (Q&A, zdieľanie nápadov, oznamy)"
star = "Ak považujete tento projekt za užitočný, bol by som vďačný, keby ste mu mohli nechať hviezdičku na GitHub-e. Vaša podpora mu pomáha osloviť širšie publikum a hlboko si ju vážim. Práve toto povzbudenie ma motivuje pokračovať v budovaní."
love = "Dielo z lásky"

