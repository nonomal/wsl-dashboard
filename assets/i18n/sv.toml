[about]
title = "Om programmet"
description = "WSL Dashboard är ett verktyg med öppen källkod för visuell hantering av Windows Subsystem for Linux (WSL). Det ger användare ett intuitivt grafiskt gränssnitt för att effektivt hantera Linux-distributioner, och stöder kärnfunktioner som start, stopp, omstart, kloning och export av säkerhetskopior med ett klick. Det inkluderar också en inbyggd distributionsbutik, vilket gör hanteringen och användningen av WSL enklare och bekvämare."
